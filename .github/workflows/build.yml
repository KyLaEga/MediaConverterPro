name: Build Native Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ComiConv-Linux
            asset_name: ComiConv
          - os: macos-latest
            artifact_name: ComiConv-macOS
            asset_name: ComiConv.app
          - os: windows-latest
            artifact_name: ComiConv-Windows
            asset_name: ComiConv.exe

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Build executable with PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "ComiConv" main.py
        
    - name: Build executable with PyInstaller (Windows/Linux)
      if: runner.os != 'macOS'
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "ComiConv" main.py
        
    - name: Package macOS App
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r ../ComiConv-macOS.zip ComiConv.app
        
    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ComiConv-macOS.zip
        
    - name: Upload Windows/Linux Artifact
      if: runner.os != 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/ComiConv*

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display downloaded artifacts
      run: ls -R artifacts
      
    - name: Create Draft Release
      uses: softprops/action-gh-release@v2
      with:
        name: "ComiConv Latest Build"
        tag_name: "v1.0.${{ github.run_number }}"
        draft: true
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/ComiConv-Linux/*
          artifacts/ComiConv-macOS/*
          artifacts/ComiConv-Windows/*
