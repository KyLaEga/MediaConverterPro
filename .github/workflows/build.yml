name: Build Native Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: ComiConv-Linux
            asset_name: ComiConv
          - os: macos-latest
            artifact_name: ComiConv-macOS
            asset_name: ComiConv.app
          - os: windows-latest
            artifact_name: ComiConv-Windows
            asset_name: ComiConv.exe

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
    - name: Build executable with PyInstaller (macOS)
      if: runner.os == 'macOS'
      run: |
        pyinstaller --noconfirm --onedir --windowed --noupx --name "ComiConv" main.py
        
    - name: Build executable with PyInstaller (Windows/Linux)
      if: runner.os != 'macOS'
      shell: bash
      run: |
        # Keep only the Qt modules the app actually imports (QtCore/QtGui/QtWidgets/QtSvg),
        # mirroring the macOS framework whitelist, to shrink the one-file bundle.
        EXCLUDES="\
        --exclude-module PySide6.QtNetwork --exclude-module PySide6.QtXml \
        --exclude-module PySide6.QtPrintSupport --exclude-module PySide6.QtTest \
        --exclude-module PySide6.QtConcurrent --exclude-module PySide6.QtDBus \
        --exclude-module PySide6.QtOpenGL --exclude-module PySide6.QtOpenGLWidgets \
        --exclude-module PySide6.QtSql --exclude-module PySide6.QtPdf \
        --exclude-module PySide6.QtPdfWidgets --exclude-module PySide6.QtSvgWidgets \
        --exclude-module PySide6.QtQml --exclude-module PySide6.QtQuick \
        --exclude-module PySide6.QtQuickWidgets --exclude-module PySide6.QtMultimedia \
        --exclude-module PySide6.QtMultimediaWidgets --exclude-module PySide6.QtWebEngineCore \
        --exclude-module PySide6.QtWebEngineWidgets --exclude-module PySide6.QtWebChannel \
        --exclude-module PySide6.QtCharts --exclude-module PySide6.QtDataVisualization \
        --exclude-module PySide6.Qt3DCore --exclude-module PySide6.QtPositioning \
        --exclude-module PySide6.QtBluetooth --exclude-module PySide6.QtNfc \
        --exclude-module PySide6.QtSerialPort --exclude-module PySide6.QtHelp \
        --exclude-module PySide6.QtUiTools --exclude-module PySide6.QtDesigner \
        --exclude-module PySide6.QtScxml --exclude-module PySide6.QtSensors \
        --exclude-module PySide6.QtStateMachine --exclude-module PySide6.QtTextToSpeech \
        --exclude-module PySide6.QtRemoteObjects --exclude-module PySide6.QtLocation \
        --exclude-module PySide6.QtWebSockets --exclude-module tkinter"
        pyinstaller --noconfirm --onefile --windowed --name "ComiConv" $EXCLUDES main.py

    - name: Strip macOS App Bundle
      if: runner.os == 'macOS'
      run: |
        APP="dist/ComiConv.app"
        
        echo "=== Size BEFORE cleanup ==="
        du -sh "$APP"
        
        echo "=== Structure overview ==="
        find "$APP" -maxdepth 5 -name "*.framework" -type d | head -30
        find "$APP" -maxdepth 5 -name "*.abi3.so" -type f | head -30
        
        # Remove unused Qt frameworks wherever they are
        find "$APP" -maxdepth 8 -name "Qt*.framework" -type d | while read fw; do
          NAME=$(basename "$fw" .framework)
          MATCH=false
          for k in QtCore QtGui QtWidgets QtSvg; do
            [ "$NAME" = "$k" ] && MATCH=true && break
          done
          if [ "$MATCH" = "false" ]; then
            echo "Removing framework: $fw"
            rm -rf "$fw"
          fi
        done
        
        # Remove unused .abi3.so Python bindings
        find "$APP" -maxdepth 8 -name "Qt*.abi3.so" -type f | while read so; do
          NAME=$(basename "$so" .abi3.so)
          MATCH=false
          for k in QtCore QtGui QtWidgets QtSvg; do
            [ "$NAME" = "$k" ] && MATCH=true && break
          done
          if [ "$MATCH" = "false" ]; then
            echo "Removing binding: $so"
            rm -f "$so"
          fi
        done
        
        # Remove unused Qt plugin directories
        find "$APP" -maxdepth 8 -type d -name "plugins" | while read plugdir; do
          for sub in "$plugdir"/*/; do
            [ ! -d "$sub" ] && continue
            DIRNAME=$(basename "$sub")
            MATCH=false
            for k in platforms styles imageformats; do
              [ "$DIRNAME" = "$k" ] && MATCH=true && break
            done
            if [ "$MATCH" = "false" ]; then
              echo "Removing plugin: $sub"
              rm -rf "$sub"
            fi
          done
        done
        
        echo "=== Size AFTER cleanup ==="
        du -sh "$APP"

    - name: Package macOS App
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -ry ../ComiConv-macOS.zip ComiConv.app
        
    - name: Upload macOS Artifact
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ComiConv-macOS.zip
        
    - name: Upload Windows/Linux Artifact
      if: runner.os != 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/ComiConv*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Read Version
      id: get_version
      run: |
        if [ -f version.txt ]; then
          echo "VERSION=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_ENV
        else
          echo "VERSION=1.0" >> $GITHUB_ENV
        fi
      
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display downloaded artifacts
      run: ls -lhR artifacts
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "ComiConv ${{ env.VERSION }}.${{ github.run_number }}"
        tag_name: "v${{ env.VERSION }}.${{ github.run_number }}"
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/ComiConv-Linux/*
          artifacts/ComiConv-macOS/*
          artifacts/ComiConv-Windows/*
